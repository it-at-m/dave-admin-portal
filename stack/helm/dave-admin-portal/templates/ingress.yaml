{{- if .Values.ingress.enabled -}}
{{- $fullName := include "daveAdminPortal.fullname" . -}}
# Determine the service port named "service"
{{- $svcPort := 8080 }}
{{- range .Values.service.ports }}
  {{- if eq .name "service" }}
    {{- $svcPort = .port }}
  {{- end }}
{{- end }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "daveAdminPortal.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: admin-portal
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
